spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    com.idbi.msme: INFO

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  security:
    rate-limit:
      enabled: true
      requests-per-minute: ${RATE_LIMIT_RPM:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
