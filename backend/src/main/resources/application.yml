server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: msme-financial-intelligence-platform
  profiles:
    active: dev

firebase:
  config-path: ${FIREBASE_SERVICE_ACCOUNT:classpath:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:studio-1765378658-5587f}
  database-url: ${FIREBASE_DATABASE_URL:https://studio-1765378658-5587f-default-rtdb.firebaseio.com}

app:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    connect-timeout: 5000
    read-timeout: 30000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${RATE_LIMIT_RPM:60}

logging:
  level:
    root: INFO
    org.springframework.security: WARN
    com.idbi.msme: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
